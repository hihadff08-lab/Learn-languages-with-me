<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تعلم اللغات الأجنبية</title>

<style>
body{
font-family:Tahoma;
background:linear-gradient(135deg,#4facfe,#00c6fb);
margin:0;
color:#fff;
}

header{
background:#0b3d91;
padding:20px;
text-align:center;
font-size:30px;
font-weight:bold;
}

.container{
max-width:900px;
margin:20px auto;
padding:20px;
}

.card{
background:#fff;
color:#222;
border-radius:15px;
padding:20px;
margin-bottom:20px;
box-shadow:0 0 10px rgba(0,0,0,.3);
}

h2{
color:#0b3d91;
}

button{
background:#0b3d91;
color:white;
padding:10px 20px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#1565c0;
}

.word{
font-size:22px;
margin:10px 0;
}
</style>
</head>

<body>

<header>📚 تطبيق تعلم اللغات الأجنبية</header>

<div class="container">

<div class="card">
<h2>🇬🇧 الإنجليزية</h2>

<div class="word">Hello</div>
<div id="en1"></div>
<button onclick="en1.innerHTML='مرحبًا'">إظهار الترجمة</button>

<div class="word">Thank you</div>
<div id="en2"></div>
<button onclick="en2.innerHTML='شكراً'">إظهار الترجمة</button>

<div class="word">Good morning</div>
<div id="en3"></div>
<button onclick="en3.innerHTML='صباح الخير'">إظهار الترجمة</button>

</div>

<div class="card">
<h2>🇫🇷 الفرنسية</h2>

<div class="word">Bonjour</div>
<div id="fr1"></div>
<button onclick="fr1.innerHTML='مرحبًا'">إظهار الترجمة</button>

<div class="word">Merci</div>
<div id="fr2"></div>
<button onclick="fr2.innerHTML='شكراً'">إظهار الترجمة</button>

<div class="word">Au revoir</div>
<div id="fr3"></div>
<button onclick="fr3.innerHTML='إلى اللقاء'">إظهار الترجمة</button>

</div>

<div class="card">
<h2>🇪🇸 الإسبانية</h2>

<div class="word">Hola</div>
<div id="es1"></div>
<button onclick="es1.innerHTML='مرحبًا'">إظهار الترجمة</button>

<div class="word">Gracias</div>
<div id="es2"></div>
<button onclick="es2.innerHTML='شكراً'">إظهار الترجمة</button>

<div class="word">Adiós</div>
<div id="es3"></div>
<button onclick="es3.innerHTML='إلى اللقاء'">إظهار الترجمة</button>

</div>

</div>

</body>
</html>e
